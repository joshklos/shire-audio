{{ define "main" }}
<div class="list-page">
  <h2>{{ .Title }}</h2>
  {{ .Content }}
  <div class="card-grid">
    {{ range .Pages }}
      <div class="card">
        {{ with .Params.cover_image }}
          <a href="{{ $.RelPermalink }}"><img src="{{ . }}" alt="{{ $.Title }}"></a>
        {{ end }}
        <div class="card-body">
          <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
          <p>{{ .Summary }}</p>
          <a href="{{ .RelPermalink }}" class="btn">Learn More</a>
        </div>
      </div>
    {{ end }}
  </div>
</div>
{{ end }}
