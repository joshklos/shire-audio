{{ define "main" }}
<div class="projects-page">
  <h2>{{ .Title }}</h2>
  {{ .Content }}
  <div class="project-cards">
    {{ range .Pages }}
      <div class="project-card">
        <a href="{{ .RelPermalink }}">
          {{ with .Params.cover_image }}<img src="{{ . }}" alt="{{ $.Title }}">{{ end }}
          <p>{{ .Summary }}</p>
        </a>
      </div>
    {{ end }}
  </div>
</div>
{{ end }}
